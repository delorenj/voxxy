services:
  # voxxy-core — CPU-only transport + routing. Synthesis runs in sidecar engine
  # containers (see compose.engines.yml). Service name stays `vox` so existing
  # monitoring, `docker logs -f vox`, and `mise run logs` keep working.
  vox:
    build: .
    container_name: vox
    restart: unless-stopped
    # Host postgres is reachable via host.docker.internal (same trick pgadmin uses).
    environment:
      VOX_DATABASE_URL: postgresql://${DEFAULT_USERNAME}:${DEFAULT_PASSWORD}@host.docker.internal:5432/vox
      VOX_VOICES_DIR: /data/voices
      VOX_AUDIO_CACHE_DIR: /data/audio-cache
      VOX_AUDIO_TTL_SECONDS: "3600"
      VOX_PUBLIC_BASE_URL: https://vox.delo.sh
      VOX_REF_AUDIO_MAX_SECONDS: "30"
      # Engine registry: ordered list of name=url pairs. Core tries them in
      # order; first success wins. ElevenLabs is always appended in-process
      # and self-disables without ELEVENLABS_API_KEY. Default stack assumes
      # both sidecars from compose.engines.yml are up; override via the env
      # to reorder (e.g. make vibevoice primary) or drop engines you aren't
      # running.
      VOX_ENGINES: ${VOX_ENGINES:-voxcpm=http://voxxy-engine-voxcpm:8000,vibevoice=http://voxxy-engine-vibevoice:8000}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_DEFAULT_VOICE: ${ELEVENLABS_DEFAULT_VOICE:-pNInz6obpgDQGcFmaJgB}
    volumes:
      # Voice profile WAVs (seeded + user-uploaded). Bind-mounted so you can
      # scp/rsync new voices in without the API. Core reads them to ship
      # reference audio inline in /v1/synthesize requests to engines.
      - ./voices:/data/voices
      # Short-lived OGG/Opus blobs served via /audio/<id>.ogg and fetched by
      # Telegram, browsers, Home Assistant, etc. Swept on a timer.
      - ./audio-cache:/data/audio-cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vox.rule=Host(`vox.delo.sh`)"
      - "traefik.http.routers.vox.entrypoints=websecure"
      - "traefik.http.routers.vox.tls.certresolver=letsencrypt"
      - "traefik.http.services.vox.loadbalancer.server.port=8000"
      - "traefik.docker.network=proxy"
      # FastMCP streaming needs long-lived connections; bump timeouts.
      - "traefik.http.middlewares.vox-sse.headers.customResponseHeaders.Cache-Control=no-cache"
      - "traefik.http.routers.vox.middlewares=vox-sse"

networks:
  proxy:
    external: true
