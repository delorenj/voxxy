# mise tasks for vox-tts. Thin aliases to `voxxy`; see cli/ for the implementation.
#
# The CLI (`voxxy`) is the single source of truth for stack lifecycle, engine
# swap, voice management, and synthesis. These tasks exist so muscle memory
# built against `mise run <x>` keeps working; each one shells out to the
# corresponding `voxxy` subcommand.
#
# Raw-compose holdouts:
#   - `build` / `build:core` / `build:voxcpm` / `build:vibevoice` still wrap
#     `docker compose build` directly because the CLI doesn't own image-build
#     ops in v1.
#   - `migrate` wraps `psql` against host postgres (CLI doesn't manage schema).
#
# Usage:
#   mise tasks               # list every task with descriptions
#   mise run up              # full stack (core + engines)
#   mise run smoke           # end-to-end synthesize + fetch + probe
#   mise run install-cli     # bootstrap voxxy globally (alias for `voxxy daemon install`)

[tools]
# Pin nothing here; defer to the host. This file is task-focused, not env-focused.

[env]
# Path mise resolves against when running `op run` (for the raw-compose tasks).
VOX_OP_ENV_FILE = ".env.template"
# Compose file list for raw-compose build tasks.
VOX_COMPOSE_FULL = "-f compose.yml -f compose.engines.yml"
VOX_COMPOSE_CORE = "-f compose.yml"

# ---------------------------------------------------------------------------
# Stack lifecycle — alias to `voxxy daemon *`
# ---------------------------------------------------------------------------

[tasks.up]
description = "Start the full stack (core + engines). Alias for `voxxy daemon start`."
run = "voxxy daemon start"

[tasks."up:core-only"]
description = "Start only voxxy-core. Alias for `voxxy daemon start --core-only`."
run = "voxxy daemon start --core-only"

[tasks."up:engines"]
description = "Start only the engine sidecars. Alias for `voxxy daemon start --engines-only`."
run = "voxxy daemon start --engines-only"

[tasks.down]
description = "Stop and remove all containers. Alias for `voxxy daemon stop`."
run = "voxxy daemon stop"

[tasks.restart]
description = "Recreate voxxy-core (picks up app/ code changes). Alias for `voxxy daemon restart`."
run = "voxxy daemon restart"

# ---------------------------------------------------------------------------
# Logs — alias to `voxxy logs` / `voxxy engine logs`
# ---------------------------------------------------------------------------

[tasks.logs]
description = "Tail voxxy-core logs. Alias for `voxxy logs`."
run = "voxxy logs"

[tasks."logs:voxcpm"]
description = "Tail voxxy-engine-voxcpm logs. Alias for `voxxy engine logs voxcpm`."
run = "voxxy engine logs voxcpm"

[tasks."logs:vibevoice"]
description = "Tail voxxy-engine-vibevoice logs. Alias for `voxxy engine logs vibevoice`."
run = "voxxy engine logs vibevoice"

# ---------------------------------------------------------------------------
# Health / verify — alias to `voxxy health`
# ---------------------------------------------------------------------------

[tasks.health]
description = "Hit /healthz and pretty-print engine availability. Alias for `voxxy health`."
run = "voxxy health"

[tasks.verify]
description = "Cheap liveness probe against the stack. Alias for `voxxy health`."
run = "voxxy health"

# ---------------------------------------------------------------------------
# Smoke — voxxy health first (fail fast), then the existing live-verifier.
# ---------------------------------------------------------------------------

[tasks.smoke]
description = "End-to-end: healthz preflight, synthesize via speak_url, fetch, probe, and run the engine-contract live verifier."
run = '''
set -euo pipefail
echo "--- voxxy health preflight ---"
voxxy health
resp=$(curl -fsS -D /tmp/vox_smoke_headers.txt -X POST https://vox.delo.sh/synthesize-url \
  -H 'content-type: application/json' \
  -d '{"text":"Vox smoke test.","voice":"rick"}')
echo "$resp" | python3 -m json.tool
url=$(echo "$resp" | python3 -c "import json,sys; print(json.load(sys.stdin)['audio_url'])")
echo "--- response headers ---"
cat /tmp/vox_smoke_headers.txt
echo "--- checking X-Vox-Engine header ---"
grep -i '^x-vox-engine:' /tmp/vox_smoke_headers.txt || { echo "FAIL: X-Vox-Engine header missing"; exit 1; }
curl -fsSL "$url" -o /tmp/vox_smoke.ogg
file /tmp/vox_smoke.ogg
ffprobe -v error -show_entries stream=codec_name,sample_rate,channels \
        -show_entries format=duration \
        -of default=noprint_wrappers=1 /tmp/vox_smoke.ogg
echo "--- engine-contract live check ---"
bash scripts/verify-engine-contract.sh --live
'''

# ---------------------------------------------------------------------------
# Raw-compose holdouts — build ops and postgres migrations
# ---------------------------------------------------------------------------

[tasks.migrate]
description = "Apply SQL migrations against the host postgres `vox` database."
run = '''
set -euo pipefail
for f in migrations/*.sql; do
  echo "applying $f"
  op run --env-file {{env.VOX_OP_ENV_FILE}} -- \
    bash -c 'psql -h localhost -U "$DEFAULT_USERNAME" -d vox -f "$0"' "$f"
done
'''

[tasks.build]
description = "Rebuild all images without starting."
run = "op run --env-file {{env.VOX_OP_ENV_FILE}} -- docker compose {{env.VOX_COMPOSE_FULL}} build"

[tasks."build:core"]
description = "Rebuild just voxxy-core."
run = "op run --env-file {{env.VOX_OP_ENV_FILE}} -- docker compose {{env.VOX_COMPOSE_CORE}} build vox"

[tasks."build:voxcpm"]
description = "Rebuild just the voxcpm engine image."
run = "op run --env-file {{env.VOX_OP_ENV_FILE}} -- docker compose {{env.VOX_COMPOSE_FULL}} build voxxy-engine-voxcpm"

[tasks."build:vibevoice"]
description = "Rebuild just the vibevoice engine image."
run = "op run --env-file {{env.VOX_OP_ENV_FILE}} -- docker compose {{env.VOX_COMPOSE_FULL}} build voxxy-engine-vibevoice"

# ---------------------------------------------------------------------------
# Install — bootstrap voxxy globally via `voxxy daemon install`
# ---------------------------------------------------------------------------

[tasks.install-cli]
description = "Install voxxy globally + shell completions. Alias for `voxxy daemon install --completions`."
run = '''
set -eu
if command -v voxxy >/dev/null 2>&1; then
  exec voxxy daemon install --completions
fi
# Bootstrap case: voxxy isn't on PATH yet. Drop into cli/ and install directly.
if ! command -v uv >/dev/null 2>&1; then
  echo "uv is required for the first install." >&2
  echo "install: https://docs.astral.sh/uv/getting-started/installation/" >&2
  exit 1
fi
echo "bootstrapping: voxxy not on PATH; running uv tool install cli/ ..." >&2
uv tool install --force "$(pwd)/cli"
if ! command -v voxxy >/dev/null 2>&1; then
  echo "voxxy installed but not on PATH; add ~/.local/bin to your shell rc" >&2
  exit 1
fi
exec voxxy daemon install --completions
'''
