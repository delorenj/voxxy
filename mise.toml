# mise tasks for vox-tts. Wraps docker compose invocations with `op run` so
# secrets stay in 1password instead of on disk.
#
# Topology (see docs/specs/engine-decoupling.md):
#   compose.yml          — voxxy-core (CPU-only transport/routing)
#   compose.engines.yml  — GPU-bound engine sidecars (voxcpm, vibevoice, ...)
#
# Usage:
#   mise run up              # full stack (core + engines)
#   mise run up:core-only    # just core; engines managed externally
#   mise run up:engines      # just engines (useful for partial restart)
#   mise run down            # stop + remove all containers
#   mise run logs            # tail core logs
#   mise run logs:voxcpm     # tail voxcpm engine logs
#   mise run restart         # recreate core (picks up app/ code changes)
#   mise run health          # curl /healthz and pretty-print engine status
#   mise run smoke           # end-to-end synthesize + fetch + probe
#   mise run migrate         # apply SQL migrations against host postgres
#   mise run build           # rebuild all images
#   mise run build:voxcpm    # rebuild just the voxcpm engine
#   mise tasks               # list every task with descriptions

[tools]
# Pin nothing here; defer to the host. This file is task-focused, not env-focused.

[env]
# Path mise resolves against when running `op run`. Kept in-repo so it travels
# with the code and is self-explanatory.
VOX_OP_ENV_FILE = ".env.template"
# Compose file list. Engines are an overlay so `up:core-only` can drop them.
VOX_COMPOSE_FULL = "-f compose.yml -f compose.engines.yml"
VOX_COMPOSE_CORE = "-f compose.yml"

[tasks.up]
description = "Build + start the full stack (core + engines) with secrets from 1password"
run = "op run --env-file {{env.VOX_OP_ENV_FILE}} -- docker compose {{env.VOX_COMPOSE_FULL}} up -d --build"

[tasks."up:core-only"]
description = "Start only voxxy-core (engines managed externally)"
run = "op run --env-file {{env.VOX_OP_ENV_FILE}} -- docker compose {{env.VOX_COMPOSE_CORE}} up -d --build"

[tasks."up:engines"]
description = "Start only the engine sidecars (core managed externally)"
run = "op run --env-file {{env.VOX_OP_ENV_FILE}} -- docker compose {{env.VOX_COMPOSE_FULL}} up -d --build voxxy-engine-voxcpm"

[tasks.down]
description = "Stop and remove all containers in the stack"
run = "docker compose {{env.VOX_COMPOSE_FULL}} down"

[tasks.restart]
description = "Recreate voxxy-core (picks up app/ code changes)"
run = "op run --env-file {{env.VOX_OP_ENV_FILE}} -- docker compose {{env.VOX_COMPOSE_FULL}} up -d --build vox"

[tasks.logs]
description = "Tail voxxy-core logs"
run = "docker logs -f vox"

[tasks."logs:voxcpm"]
description = "Tail voxxy-engine-voxcpm logs"
run = "docker logs -f voxxy-engine-voxcpm"

[tasks.health]
description = "Hit /healthz and pretty-print engine availability"
run = "curl -fsS https://vox.delo.sh/healthz | python3 -m json.tool"

[tasks.smoke]
description = "End-to-end: synthesize via speak_url, fetch the URL, probe the codec"
run = '''
set -euo pipefail
resp=$(curl -fsS -X POST https://vox.delo.sh/synthesize-url \
  -H 'content-type: application/json' \
  -d '{"text":"Vox smoke test.","voice":"rick"}')
echo "$resp" | python3 -m json.tool
url=$(echo "$resp" | python3 -c "import json,sys; print(json.load(sys.stdin)['audio_url'])")
curl -fsSL "$url" -o /tmp/vox_smoke.ogg
file /tmp/vox_smoke.ogg
ffprobe -v error -show_entries stream=codec_name,sample_rate,channels \
        -show_entries format=duration \
        -of default=noprint_wrappers=1 /tmp/vox_smoke.ogg
'''

[tasks.migrate]
description = "Apply SQL migrations against the host postgres `vox` database"
run = '''
set -euo pipefail
for f in migrations/*.sql; do
  echo "applying $f"
  op run --env-file {{env.VOX_OP_ENV_FILE}} -- \
    bash -c 'psql -h localhost -U "$DEFAULT_USERNAME" -d vox -f "$0"' "$f"
done
'''

[tasks.build]
description = "Rebuild all images without starting"
run = "op run --env-file {{env.VOX_OP_ENV_FILE}} -- docker compose {{env.VOX_COMPOSE_FULL}} build"

[tasks."build:core"]
description = "Rebuild just voxxy-core"
run = "op run --env-file {{env.VOX_OP_ENV_FILE}} -- docker compose {{env.VOX_COMPOSE_CORE}} build vox"

[tasks."build:voxcpm"]
description = "Rebuild just the voxcpm engine image"
run = "op run --env-file {{env.VOX_OP_ENV_FILE}} -- docker compose {{env.VOX_COMPOSE_FULL}} build voxxy-engine-voxcpm"

[tasks.install-cli]
description = "Symlink scripts/vox-speak into ~/.local/bin for shell-wide use"
run = '''
set -eu
src="$(pwd)/scripts/vox-speak"
dst="$HOME/.local/bin/vox-speak"
if [ ! -x "$src" ]; then
  echo "missing or non-executable: $src" >&2
  exit 1
fi
mkdir -p "$HOME/.local/bin"
ln -sfn "$src" "$dst"
echo "linked $dst -> $src"
if command -v vox-speak >/dev/null 2>&1; then
  echo "on PATH: $(command -v vox-speak)"
else
  echo "warning: ~/.local/bin is not on PATH; add it to your shell rc"
fi
'''
